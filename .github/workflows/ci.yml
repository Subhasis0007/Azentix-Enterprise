name: Azentix CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "8.0.x"
  PYTHON_VERSION: "3.11"

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: .NET build + unit tests
  # No secrets required — tests are pure unit tests against Models only
  # ──────────────────────────────────────────────────────────────────────────
  dotnet-build-test:
    name: .NET Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore NuGet packages
        run: dotnet restore src/Azentix.sln

      - name: Build (Release)
        run: dotnet build src/Azentix.sln --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test src/Azentix.sln \
            --no-build \
            --configuration Release \
            --filter "Category=Unit" \
            --results-directory ./test-results \
            --logger "trx;LogFileName=results.trx" \
            --logger "console;verbosity=normal"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-test-results
          path: test-results/

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Python flow tests
  # Runs demo_offline.py (no credentials) and test_flows.py (14 unit assertions)
  # ──────────────────────────────────────────────────────────────────────────
  python-tests:
    name: Python Flow Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: src/langgraph/requirements.txt

      - name: Install Python dependencies
        run: pip install -r src/langgraph/requirements.txt

      - name: Run offline demo (zero credentials needed)
        run: python3 scripts/demo_offline.py

      - name: Run flow unit tests (14 assertions)
        run: python3 scripts/test_flows.py

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: Kong Gateway config validation
  # Uses deck (Kong's declarative config tool) to lint kong/kong.yml
  # ──────────────────────────────────────────────────────────────────────────
  kong-validate:
    name: Kong Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kong deck
        run: |
          # Download specific stable version to avoid breaking changes
          curl -sL https://github.com/Kong/deck/releases/download/v1.38.1/deck_1.38.1_linux_amd64.tar.gz \
            | tar -xz
          sudo mv deck /usr/local/bin/deck
          deck version

      - name: Validate kong/kong.yml syntax
        run: deck file validate kong/kong.yml

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4: Docker build + smoke test
  # Builds the Dockerfile, starts container with dummy env vars,
  # checks /health returns HTTP 200 (health checks are skipped for placeholders)
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: src
        run: |
          docker build \
            -f Azentix.AgentHost/Dockerfile \
            -t azentix-test:ci \
            .

      - name: Smoke test — container starts and /health responds
        run: |
          docker run -d \
            --name azentix-smoke \
            -p 5001:5000 \
            -e ASPNETCORE_URLS="http://+:5000" \
            -e AZURE_OPENAI_ENDPOINT="https://placeholder.openai.azure.com/" \
            -e AZURE_OPENAI_API_KEY="placeholder-key-32chars-xxxxxxxxxx" \
            -e AZURE_OPENAI_DEPLOYMENT_NAME="gpt-4o-mini" \
            -e AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-3-small" \
            -e SUPABASE_URL="https://placeholder.supabase.co" \
            -e SUPABASE_ANON_KEY="placeholder-anon-key" \
            -e SUPABASE_SERVICE_KEY="placeholder-service-key" \
            -e SUPABASE_DB_CONNECTION="Host=localhost;Database=azentix" \
            -e CLOUDAMQP_URL="amqp://guest:guest@localhost//" \
            -e SAP_BASE_URL="https://sandbox.api.sap.com/s4hanacloud" \
            -e SAP_API_KEY="placeholder" \
            -e SALESFORCE_INSTANCE_URL="https://placeholder.salesforce.com" \
            -e SALESFORCE_CLIENT_ID="placeholder" \
            -e SALESFORCE_CLIENT_SECRET="placeholder" \
            -e SALESFORCE_USERNAME="placeholder@example.com" \
            -e SALESFORCE_PASSWORD="placeholder" \
            -e SERVICENOW_INSTANCE_URL="https://placeholder.service-now.com" \
            -e SERVICENOW_USERNAME="admin" \
            -e SERVICENOW_PASSWORD="placeholder" \
            -e HUBSPOT_ACCESS_TOKEN="placeholder" \
            -e HUBSPOT_PORTAL_ID="12345678" \
            -e STRIPE_SECRET_KEY="sk_test_placeholder" \
            azentix-test:ci

          echo "Waiting 30 seconds for container to start..."
          sleep 30

          echo "=== Container logs ==="
          docker logs azentix-smoke 2>&1

          echo "=== Health check ==="
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5001/health)
          echo "Health endpoint returned HTTP $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "503" ]; then
            echo "✅ Container is responding (200=Healthy, 503=Degraded but alive — both OK in smoke test)"
            exit 0
          else
            echo "❌ Container not responding — HTTP $HTTP_STATUS"
            docker logs azentix-smoke 2>&1
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker stop azentix-smoke || true && docker rm azentix-smoke || true

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5: Security scan
  # Checks .env is not tracked. TruffleHog is non-blocking (continue-on-error).
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for TruffleHog

      - name: Verify .env is not committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "❌ ERROR: .env file is committed! Remove it immediately and rotate all credentials."
            exit 1
          fi
          echo "✅ .env is not tracked by git."

      - name: Verify .env is in .gitignore
        run: |
          if grep -q "^\.env$" .gitignore; then
            echo "✅ .env is in .gitignore"
          else
            echo "❌ .env is NOT in .gitignore — add it!"
            exit 1
          fi

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: "./"
          head: HEAD
          base: HEAD~1
        continue-on-error: true   # informational — does not block merge
