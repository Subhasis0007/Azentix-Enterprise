
name: Azentix CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "8.0.x"
  PYTHON_VERSION: "3.11"
  DECK_VERSION: "1.57.0" # pin for stability; change if you want newer

jobs:
  # ── .NET build + unit tests ──────────────────────────────────────────
  dotnet-build-test:
    name: .NET Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/Azentix.sln

      - name: Build
        run: dotnet build src/Azentix.sln --no-restore --configuration Release

      - name: Unit Tests
        run: |
          dotnet test src/Azentix.sln \
            --no-build --configuration Release \
            --filter "Category=Unit" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=results.trx"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ./coverage
          flags: dotnet

  # ── Python flow tests ────────────────────────────────────────────────
  python-tests:
    name: Python Flow Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r src/langgraph/requirements.txt

      - name: Run tests (no integration)
        run: python3 scripts/test_flows.py
        env:
          AZURE_OPENAI_ENDPOINT:     ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY:      ${{ secrets.AZURE_OPENAI_API_KEY }}
          SUPABASE_DB_CONNECTION:    ${{ secrets.SUPABASE_DB_CONNECTION }}
          CLOUDAMQP_URL:             ${{ secrets.CLOUDAMQP_URL }}
          SAP_API_KEY:               ${{ secrets.SAP_API_KEY }}
          SALESFORCE_CLIENT_ID:      ${{ secrets.SALESFORCE_CLIENT_ID }}
          SALESFORCE_CLIENT_SECRET:  ${{ secrets.SALESFORCE_CLIENT_SECRET }}
          SERVICENOW_INSTANCE_URL:   ${{ secrets.SERVICENOW_INSTANCE_URL }}
          HUBSPOT_ACCESS_TOKEN:      ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          STRIPE_SECRET_KEY:         ${{ secrets.STRIPE_SECRET_KEY }}

      - name: Run offline demo
        run: python3 scripts/demo_offline.py

  # ── Kong config validation ───────────────────────────────────────────
  kong-validate:
    name: Kong Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # FIX: Use Kong's supported setup action instead of fragile curl latest URL
      - name: Setup decK
        uses: Kong/setup-deck@v1
        with:
          deck-version: ${{ env.DECK_VERSION }}

      - name: Validate kong.yml
        run: deck validate --state kong/kong.yml

  # ── Docker build ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        working-directory: src
        run: docker build -f Azentix.AgentHost/Dockerfile -t azentix-test .

      - name: Smoke test — container starts
        run: |
          docker run -d --name smoke -p 5001:5000 \
            -e ASPNETCORE_URLS="http://+:5000" \
            -e AZURE_OPENAI_ENDPOINT="https://placeholder.openai.azure.com/" \
            -e AZURE_OPENAI_API_KEY="placeholder-key" \
            -e SUPABASE_URL="https://placeholder.supabase.co" \
            -e SUPABASE_ANON_KEY="placeholder" \
            -e SUPABASE_SERVICE_KEY="placeholder" \
            -e SUPABASE_DB_CONNECTION="Host=placeholder" \
            -e CLOUDAMQP_URL="amqp://guest:guest@localhost//" \
            azentix-test
          sleep 20
          docker logs smoke 2>&1 | tail -20
          docker stop smoke

  # ── Security scan ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check .env not committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is committed — remove it immediately!"
            exit 1
          fi
          echo ".env is not tracked. Good."

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: "./"
          head: HEAD
        continue-on-error: true
``
