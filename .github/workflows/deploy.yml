name: Azentix Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Render.com
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render.com deploy
        run: |
          curl -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "Deploy triggered"
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

      - name: Wait and health check
        run: |
          echo "Waiting 90 seconds for Render to deploy..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://azentix-agent-host.onrender.com/health")
          echo "Health check returned HTTP $STATUS"
          if [ "$STATUS" -eq 200 ]; then
            echo "Deployment successful!"
          else
            echo "Health check FAILED. Check Render logs."
            exit 1
          fi

      - name: Notify deployment via RabbitMQ
        run: |
          python3 << 'PYEOF'
          import pika, json, os
          url = os.environ.get("CLOUDAMQP_URL", "")
          if url:
              conn = pika.BlockingConnection(pika.URLParameters(url))
              ch = conn.channel()
              ch.queue_declare(queue="notifications", durable=True)
              ch.basic_publish(exchange="", routing_key="notifications",
                  body=json.dumps({"type": "deployment_complete",
                                   "env": "${{ github.event.inputs.environment || 'dev' }}",
                                   "commit": "${{ github.sha }}"[:7]}),
                  properties=pika.BasicProperties(delivery_mode=2))
              conn.close()
              print("Deployment notification published")
          PYEOF
        env:
          CLOUDAMQP_URL: ${{ secrets.CLOUDAMQP_URL }}
