
name: Azentix Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Render.com
    runs-on: ubuntu-latest

    env:
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
      CLOUDAMQP_URL: ${{ secrets.CLOUDAMQP_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render deployment
        run: |
          if [ -z "$RENDER_SERVICE_ID" ] || [ -z "$RENDER_API_KEY" ]; then
            echo "⚠️  Render secrets not configured — skipping deploy trigger."
            exit 0
          fi

          echo "🚀 Triggering Render deploy..."
          RESPONSE=$(curl -s -o /tmp/render_response.json -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY")

          cat /tmp/render_response.json

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
            echo "✅ Render deploy triggered successfully"
          else
            echo "❌ Render deploy failed (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Wait for deployment and run health check
        run: |
          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Skipping health check — Render not configured"
            exit 0
          fi

          echo "⏳ Waiting 90 seconds for service startup..."
          sleep 90

          APP_URL="${RENDER_APP_URL:-https://azentix-agent-host.onrender.com}"
          echo "Checking health at $APP_URL/health"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health")
          echo "Health check HTTP status: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "✅ Service is healthy"
          elif [ "$STATUS" = "503" ]; then
            echo "⚠️  Service responded 503 — degraded but running"
          else
            echo "❌ Health check failed"
            exit 1
          fi

      - name: Publish deployment notification (RabbitMQ)
        if: env.CLOUDAMQP_URL != ''
        run: |
          pip install pika --quiet

          python3 <<'PYEOF'
          import os, json, pika

          url = os.environ.get("CLOUDAMQP_URL", "")
          if not url:
              print("RabbitMQ URL missing — skipping notification")
              exit(0)

          try:
              connection = pika.BlockingConnection(pika.URLParameters(url))
              channel = connection.channel()
              channel.queue_declare(queue="notifications", durable=True)

              payload = {
                  "type": "deployment_complete",
                  "environment": "${{ github.event.inputs.environment || 'dev' }}",
                  "commit": "${{ github.sha }}"[:7],
                  "actor": "${{ github.actor }}"
              }

              channel.basic_publish(
                  exchange="",
                  routing_key="notifications",
                  body=json.dumps(payload),
                  properties=pika.BasicProperties(delivery_mode=2)
              )

              connection.close()
              print("✅ Deployment notification published")

          except Exception as e:
              print(f"⚠️ RabbitMQ notification skipped: {e}")
          PYEOF
