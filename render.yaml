services:
  - type: web
    name: azentix-itops-api
    runtime: docker
    dockerfilePath: ./src/Azentix.AgentHost/Dockerfile
    rootDir: .
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: MODEL_PROVIDER
        value: azure
      - key: ALLOWED_ORIGINS
        value: https://azentix-itops-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://azentix-itops-api.onrender.com
      - key: INTERNAL_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_CHAT_DEPLOYMENT
        value: gpt-4o-mini
      - key: AZURE_OPENAI_EMBED_DEPLOYMENT
        value: text-embedding-3-small
      - key: SERVICENOW_INSTANCE_URL
        sync: false
      - key: SERVICENOW_USERNAME
        sync: false
      - key: SERVICENOW_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SALESFORCE_CLIENT_ID
        sync: false
      - key: SALESFORCE_CLIENT_SECRET
        sync: false
      - key: SALESFORCE_USERNAME
        sync: false
      - key: SALESFORCE_PASSWORD
        sync: false
      - key: SAP_BASE_URL
        sync: false
      - key: SAP_API_KEY
        sync: false
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_DB_CONNECTION
        sync: false

  - type: worker
    name: azentix-langgraph-worker
    runtime: python
    rootDir: .
    buildCommand: pip install -r src/langgraph/requirements.txt
    startCommand: python src/langgraph/worker.py
    autoDeploy: true
    envVars:
      - key: CLOUDAMQP_URL
        sync: false
      - key: RABBITMQ_QUEUE_SAP_PRICES
        value: sap-price-changes
      - key: RABBITMQ_QUEUE_INCIDENTS
        value: servicenow-incidents
      - key: RABBITMQ_QUEUE_STRIPE
        value: stripe-events
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: SERVICENOW_INSTANCE_URL
        sync: false
      - key: SERVICENOW_USERNAME
        sync: false
      - key: SERVICENOW_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SALESFORCE_CLIENT_ID
        sync: false
      - key: SALESFORCE_CLIENT_SECRET
        sync: false
      - key: SALESFORCE_USERNAME
        sync: false
      - key: SALESFORCE_PASSWORD
        sync: false
      - key: SAP_BASE_URL
        sync: false
      - key: SAP_API_KEY
        sync: false
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_DB_CONNECTION
        sync: false
