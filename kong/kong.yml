_format_version: "3.0"
_transform: true

# ── Services ──────────────────────────────────────────────────────────────
services:
  - name: azentix-agent-service
    url: https://azentix-agent-host.onrender.com
    connect_timeout: 10000
    write_timeout:   120000
    read_timeout:    120000
    routes:
      - name: azentix-agent-route
        paths:      ["/azentix/v1"]
        strip_path: true
        methods:    [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      - name: azentix-mcp-route
        paths:         ["/mcp"]
        strip_path:    false
        methods:       [GET, POST, OPTIONS]
        # SSE streams need long read timeout — override per-route
        response_buffering: false
    plugins:
      - name: key-auth
        config:
          key_names:         [X-API-Key]
          hide_credentials:  true   # never forward the key to upstream

      # Rate limiting: replaces APIM rate-limit policy
      - name: rate-limiting
        config:
          minute:         60
          hour:           1000
          policy:         local
          fault_tolerant: true
          error_message:  "Azentix: Rate limit exceeded. Retry after 60 seconds."

      # Request enrichment
      - name: request-transformer
        config:
          add:
            headers:
              - "X-Gateway: Kong-Azentix/1.0"

      # CORS — restrict to your own domain in production
      # Set CORS_ALLOWED_ORIGINS env var; falls back to localhost defaults
      - name: cors
        config:
          origins:     ["${CORS_ALLOWED_ORIGINS:-http://localhost:3000}"]
          methods:     [GET, POST, OPTIONS]
          headers:     [Authorization, Content-Type, X-API-Key, X-Correlation-Id]
          credentials: false
          max_age:     3600

  - name: azentix-health-service
    url: https://azentix-agent-host.onrender.com
    routes:
      - name: health-route
        paths:      ["/health"]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 120
          policy: local

# ── Consumers: keys injected from env — never commit real values ─────────────
# Override these at deploy time via Kong Admin API or deck --env-file
consumers:
  - username: azentix-internal
    keyauth_credentials:
      - key: "${KONG_KEY_INTERNAL:-azentix-internal-replace-in-prod}"

  - username: langgraph-worker
    keyauth_credentials:
      - key: "${KONG_KEY_LANGGRAPH:-langgraph-worker-replace-in-prod}"

  - username: external-client
    keyauth_credentials:
      - key: "${KONG_KEY_EXTERNAL:-external-client-replace-in-prod}"
