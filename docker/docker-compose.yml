version: "3.8"

# Starts Kong + n8n + optional local RabbitMQ + Grafana Agent
# Usage:
#   Full stack:          docker-compose up -d
#   With local RabbitMQ: docker-compose --profile local-mq up -d
#   With observability:  docker-compose --profile observability up -d

services:

  # ── Kong Gateway (replaces Azure APIM) ──────────────────────────────
  kong:
    image: kong:3.6-ubuntu
    container_name: azentix-kong
    environment:
      KONG_DATABASE:          "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN:      0.0.0.0:8000
      KONG_ADMIN_LISTEN:      0.0.0.0:8001
      KONG_LOG_LEVEL:         info
      KONG_PLUGINS:           bundled
    volumes:
      - ../kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"    # Kong proxy  → your apps call this
      - "8001:8001"    # Kong Admin  → deck / curl admin API
    healthcheck:
      test:     ["CMD", "kong", "health"]
      interval: 30s
      timeout:  10s
      retries:  3
    restart: unless-stopped

  # ── n8n Workflow Engine (replaces Azure Logic Apps) ──────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: azentix-n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE:   "true"
      N8N_BASIC_AUTH_USER:     "${N8N_BASIC_AUTH_USER:-admin}"
      N8N_BASIC_AUTH_PASSWORD: "${N8N_BASIC_AUTH_PASSWORD:-admin123}"
      WEBHOOK_URL:             "http://localhost:5678"
      GENERIC_TIMEZONE:        "Europe/London"
      N8N_PORT:                5678
      KONG_PROXY_URL:          "${KONG_PROXY_URL:-http://kong:8000}"
      KONG_API_KEY_AZENTIX:    "${KONG_API_KEY_AZENTIX:-azentix-internal-key-change-this}"
      CLOUDAMQP_URL:           "${CLOUDAMQP_URL:-}"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      kong:
        condition: service_healthy
    restart: unless-stopped

  # ── Local RabbitMQ (optional, use CloudAMQP in production) ───────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: azentix-rabbitmq-local
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    profiles: [local-mq]
    restart: unless-stopped

  # ── Grafana Agent (ships logs/metrics to Grafana Cloud) ───────────────
  grafana-agent:
    image: grafana/agent:latest
    container_name: azentix-grafana-agent
    command: ["-config.file=/etc/agent/agent-config.yaml"]
    environment:
      GRAFANA_API_KEY:          "${GRAFANA_API_KEY:-}"
      GRAFANA_PROMETHEUS_URL:   "${GRAFANA_PROMETHEUS_URL:-}"
      GRAFANA_PROMETHEUS_USER:  "${GRAFANA_PROMETHEUS_USER:-}"
      GRAFANA_LOKI_URL:         "${GRAFANA_LOKI_URL:-}"
      GRAFANA_LOKI_USER:        "${GRAFANA_LOKI_USER:-}"
    volumes:
      - ../grafana/agent-config.yaml:/etc/agent/agent-config.yaml:ro
    profiles: [observability]
    restart: unless-stopped

volumes:
  n8n_data:
  rabbitmq_data:
