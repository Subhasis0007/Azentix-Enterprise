version: "3.8"

# Starts Kong + optional local RabbitMQ + Grafana Agent
# Usage:
#   Full stack:          docker-compose up -d
#   With local RabbitMQ: docker-compose --profile local-mq    up -d
#   With observability:  docker-compose --profile observability up -d
# Workflows run as LangGraph Python processes — no workflow engine server needed.

services:

  # ── Kong Gateway (replaces Azure APIM) ──────────────────────────────
  kong:
    image: kong:3.6-ubuntu
    container_name: azentix-kong
    environment:
      KONG_DATABASE:          "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN:      0.0.0.0:8000
      KONG_ADMIN_LISTEN:      127.0.0.1:8001   # Admin API: localhost only
      KONG_LOG_LEVEL:         info
      KONG_PLUGINS:           bundled
      CORS_ALLOWED_ORIGINS:   "${CORS_ALLOWED_ORIGINS:-http://localhost:3000}"
      KONG_KEY_INTERNAL:      "${KONG_KEY_INTERNAL}"
      KONG_KEY_LANGGRAPH:     "${KONG_KEY_LANGGRAPH}"
      KONG_KEY_EXTERNAL:      "${KONG_KEY_EXTERNAL}"
    volumes:
      - ../kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"    # Kong proxy  → your apps call this
      # Kong Admin is NOT exposed to host — use `docker exec` or a tunnel
    healthcheck:
      test:     ["CMD", "kong", "health"]
      interval: 30s
      timeout:  10s
      retries:  3
    restart: unless-stopped

  # ── Local RabbitMQ (optional, use CloudAMQP in production) ───────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: azentix-rabbitmq-local
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:?RABBITMQ_USER must be set}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS:?RABBITMQ_PASS must be set}"
    ports:
      - "5672:5672"     # AMQP
      # Management UI NOT exposed to host by default — use `docker port` or override
      # - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    profiles: [local-mq]
    restart: unless-stopped

  # ── Grafana Agent (ships logs/metrics to Grafana Cloud) ───────────────
  grafana-agent:
    image: grafana/agent:latest
    container_name: azentix-grafana-agent
    command: ["-config.file=/etc/agent/agent-config.yaml"]
    environment:
      GRAFANA_API_KEY:          "${GRAFANA_API_KEY:-}"
      GRAFANA_PROMETHEUS_URL:   "${GRAFANA_PROMETHEUS_URL:-}"
      GRAFANA_PROMETHEUS_USER:  "${GRAFANA_PROMETHEUS_USER:-}"
      GRAFANA_LOKI_URL:         "${GRAFANA_LOKI_URL:-}"
      GRAFANA_LOKI_USER:        "${GRAFANA_LOKI_USER:-}"
    volumes:
      - ../grafana/agent-config.yaml:/etc/agent/agent-config.yaml:ro
    profiles: [observability]
    restart: unless-stopped

volumes:
  rabbitmq_data:
